<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#171F3A"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="200" x2="1020" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="630" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="28" fill="url(#bg)"/>
  <rect x="70" y="70" width="1060" height="490" rx="24" fill="#0F172A" stroke="#334155"/>

  <text x="110" y="150" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700">llmfit-mod</text>
  <text x="110" y="195" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="24">Custom model ingestion for llmfit without hand-editing the registry</text>

  <g filter="url(#shadow)">
    <rect x="110" y="250" width="220" height="94" rx="18" fill="#111827" stroke="#475569"/>
    <text x="145" y="304" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">HF repo</text>
    <text x="145" y="332" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="18">GGUF source</text>

    <rect x="400" y="250" width="220" height="94" rx="18" fill="#111827" stroke="#475569"/>
    <text x="427" y="304" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Normalize</text>
    <text x="427" y="332" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="18">family + quant rules</text>

    <rect x="690" y="250" width="220" height="94" rx="18" fill="#111827" stroke="#475569"/>
    <text x="732" y="304" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Registry</text>
    <text x="732" y="332" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="18">hf_models.json</text>

    <rect x="980" y="250" width="110" height="94" rx="18" fill="#111827" stroke="#475569"/>
    <text x="1002" y="304" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">TUI</text>
    <text x="1002" y="332" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="18">CLI</text>
  </g>

  <path d="M332 297H395" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M622 297H685" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M912 297H972" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>

  <text x="112" y="420" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">What it fixes</text>
  <text x="112" y="460" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="24">Manual JSON edits</text>
  <text x="112" y="496" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="24">Duplicate model entries</text>
  <text x="112" y="532" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="24">Registry drift between ingestion and runtime</text>

  <text x="785" y="420" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Current shape</text>
  <text x="785" y="460" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="24">Python sidecar now</text>
  <text x="785" y="496" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="24">Rust implementation later</text>
</svg>
